name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore BlockchainTracker.sln

      - name: Build
        run: dotnet build BlockchainTracker.sln --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/BlockchainTracker.UnitTests -c Release --no-build --logger trx --results-directory ./test-results

      - name: Integration Tests
        run: dotnet test tests/BlockchainTracker.IntegrationTests -c Release --no-build --logger trx --results-directory ./test-results

      - name: Functional Tests
        run: dotnet test tests/BlockchainTracker.FunctionalTests -c Release --no-build --logger trx --results-directory ./test-results

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t blockchaintracker:${{ github.sha }} .

      - name: Deploy
        run: echo "TODO - Deploy to ${{ github.ref_name }} environment"
